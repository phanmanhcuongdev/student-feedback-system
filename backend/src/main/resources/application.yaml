spring:
  application:
    name: backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    access-token-expiration-ms: ${APP_JWT_ACCESS_TOKEN_EXPIRATION_MS}
  verify:
    email-url-base: ${APP_VERIFY_EMAIL_URL_BASE}
  reset-password:
    url-base: ${APP_RESET_PASSWORD_URL_BASE}
    expiration-minutes: ${APP_RESET_PASSWORD_EXPIRATION_MINUTES}
  mail:
    from: ${APP_MAIL_FROM}
    resend:
      api-key: ${RESEND_API_KEY}
      api-url: ${RESEND_API_URL}
  web:
    allowed-origins: ${APP_WEB_ALLOWED_ORIGINS}
  storage:
    minio:
      endpoint: ${APP_STORAGE_MINIO_ENDPOINT}
      access-key: ${APP_STORAGE_MINIO_ACCESS_KEY}
      secret-key: ${APP_STORAGE_MINIO_SECRET_KEY}
      bucket: ${APP_STORAGE_MINIO_BUCKET:student-documents}
