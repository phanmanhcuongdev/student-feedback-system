spring:
  application:
    name: backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-me-local-dev-secret-key-32b}
    access-token-expiration-ms: ${APP_JWT_ACCESS_TOKEN_EXPIRATION_MS:86400000}
  verify:
    email-url-base: ${APP_VERIFY_EMAIL_URL_BASE:http://localhost:5173}
  reset-password:
    url-base: ${APP_RESET_PASSWORD_URL_BASE:http://localhost:5173}
    expiration-minutes: ${APP_RESET_PASSWORD_EXPIRATION_MINUTES:30}
  mail:
    from: ${APP_MAIL_FROM:noreply@cuongdso.id.vn}
    resend:
      api-key: ${RESEND_API_KEY:}
      api-url: ${RESEND_API_URL:https://api.resend.com/emails}
  web:
    allowed-origins: ${APP_WEB_ALLOWED_ORIGINS:http://localhost:5173}
