services:
  backend:
    image: ghcr.io/phanmanhcuongdev/student-feedback-system/backend:${BACKEND_TAG:-latest}
    env_file:
      - stack.env
    container_name: backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - app-network

  frontend:
    image: ghcr.io/phanmanhcuongdev/student-feedback-system/frontend:${FRONTEND_TAG:-latest}
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge